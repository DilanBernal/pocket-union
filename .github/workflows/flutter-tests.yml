name: Flutter Tests

on:
  push:
    branches: [ main, copilot/** ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Flutter Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Create .env placeholder for tests
        run: |
          echo "SUPABASE_API_URL=https://placeholder.supabase.co" > .env
          echo "SUPABASE_ANON_KEY=placeholder_anon_key" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Generate mocks with build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run unit and widget tests
        run: flutter test test/ --reporter expanded

      - name: Enable Linux desktop only for integration tests
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev clang cmake pkg-config xvfb
          flutter config --enable-linux-desktop
          flutter create --platforms=linux --no-pub .

      - name: Run integration tests
        run: xvfb-run -a flutter test integration_test/ -d linux --reporter expanded
